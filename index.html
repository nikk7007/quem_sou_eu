<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Quem sou eu?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="icon.png" type="image/x-icon" />
  </head>
  <body>
    <main class="stage">
      <!-- 1. Escolha de categoria -->
      <section class="screen" data-screen="categoria">
        <header class="intro">
          <p class="eyebrow">jogo de palavra</p>
          <h1 class="title">Quem sou eu?</h1>
          <p class="lede">
            Escolha uma categoria. O app sorteia a palavra — ninguém vê antes da
            hora.
          </p>
        </header>
        <div class="cats" id="cats"><!-- cards injetados pelo JS --></div>
      </section>

      <!-- 2. Pronto (palavra sorteada, oculta) -->
      <section class="screen" data-screen="pronto">
        <div class="ready">
          <p class="ready-cat" id="readyCat">Animais</p>
          <p class="ready-mark">
            Palavra escolhida <span class="check">✓</span>
          </p>
          <p class="ready-hint">
            Encoste o celular na testa e toque em iniciar.
          </p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="btnIniciar">
            Visualizar palavra
          </button>
          <button class="btn btn-ghost" id="btnTrocarCategoria">
            Voltar ao início
          </button>
        </div>
      </section>

      <!-- 3. Preparar (contagem 3s) -->
      <section class="screen" data-screen="preparar">
        <p class="prep-label" id="preparaCat"></p>
        <p class="prep-label">prepare-se</p>
        <p class="countdown" id="countdown" aria-live="assertive">3</p>
        <div class="actions">
          <button class="btn btn-ghost" id="btnCancelar">Cancelar</button>
        </div>
      </section>

      <!-- 4. Revelação -->
      <section class="screen screen-reveal" data-screen="revelar">
        <div class="bloom" aria-hidden="true"></div>
        <p class="word" id="word" aria-live="assertive"></p>
        <div class="progress" aria-hidden="true">
          <span class="progress-bar" id="progressBar"></span>
        </div>
      </section>

      <!-- 5. Oculto (pós-revelação) -->
      <section class="screen" data-screen="oculto">
        <div class="ready">
          <p class="ready-cat" id="ocultosCat"></p>
          <p class="ready-mark hidden-mark">Palavra oculta</p>
          <p class="ready-hint">Quer ver de novo?</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="btnLerDeNovo">Ler de novo</button>
          <button class="btn btn-ghost" id="btnNovaPalavra">
            Nova palavra
          </button>
        </div>
      </section>
    </main>

    <!-- HUD telemetry frame -->
    <div class="hud" aria-hidden="true">
      <span class="tl">// QUEM-SOU-EU : SYS</span>
      <span class="tr">REV 2.6</span>
      <span class="bl">UNIT / D-01</span>
      <span class="br">+ LIVE</span>
    </div>
    <!-- CRT scanlines -->
    <div class="scan" aria-hidden="true"></div>

    <script src="words.js"></script>
    <script src="app.js"></script>
  </body>
</html>
